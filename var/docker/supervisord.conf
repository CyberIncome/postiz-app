[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:backend]
command=pnpm run start:prod:backend
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/backend.err.log
stdout_logfile=/var/log/supervisor/backend.out.log
environment=PORT="3000"

[program:frontend]
command=pnpm run start:prod:frontend
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/frontend.err.log
stdout_logfile=/var/log/supervisor/frontend.out.log
environment=PORT="4200"

[program:workers]
command=pnpm run start:prod:workers
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/workers.err.log
stdout_logfile=/var/log/supervisor/workers.out.log

[program:cron]
command=pnpm run start:prod:cron
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/cron.err.log
stdout_logfile=/var/log/supervisor/cron.out.log

[program:caddy]
command=caddy run --config /app/var/docker/Caddyfile
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/caddy.err.log
stdout_logfile=/var/log/supervisor/caddy.out.log
